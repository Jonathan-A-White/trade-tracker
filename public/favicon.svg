<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="bag" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Shopping bag body -->
  <path d="M148 195 h216 c8 0 15 7 13 15 l-24 180 c-2 12 -12 20 -24 20 H183 c-12 0 -22 -8 -24 -20 L135 210 c-2 -8 5 -15 13 -15z" fill="url(#bag)" filter="url(#shadow)"/>

  <!-- Bag handle -->
  <path d="M200 195 v-40 c0 -33 27 -60 56 -60 29 0 56 27 56 60 v40" fill="none" stroke="#ffffff" stroke-opacity="0.9" stroke-width="18" stroke-linecap="round"/>

  <!-- Price trend line (upward) -->
  <polyline points="180,360 220,330 260,345 310,290 360,240" fill="none" stroke="url(#line)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)"/>

  <!-- Arrow head at end of trend -->
  <polygon points="360,240 345,268 372,258" fill="#22d3ee"/>

  <!-- Dollar sign -->
  <g transform="translate(256, 290)" fill="none" stroke="#6d28d9" stroke-width="10" stroke-linecap="round" opacity="0.5">
    <line x1="0" y1="-30" x2="0" y2="30"/>
    <path d="M-16,-18 c0,-12 12,-16 16,-16 s16,4 16,14 c0,12 -32,12 -32,24 s12,16 16,16 16,-4 16,-14"/>
  </g>
</svg>
